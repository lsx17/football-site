<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>世界足坛数据库 1950-2026</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f2;
      --ink: #1e2522;
      --muted: #66706b;
      --line: #d9dfd7;
      --panel: #ffffff;
      --green: #1f6f55;
      --deep: #173832;
      --gold: #c48a2c;
      --red: #b64d3f;
      --blue: #2f6690;
      --shadow: 0 16px 38px rgba(31, 44, 38, .10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(31, 111, 85, .08), transparent 300px),
        var(--bg);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 34px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: end;
      padding: 18px 0 16px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.1;
      font-weight: 850;
    }

    .sub {
      margin-top: 7px;
      color: var(--muted);
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(72px, 1fr));
      gap: 8px;
      min-width: 360px;
    }

    .stat {
      padding: 10px 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 18px rgba(31, 44, 38, .06);
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: minmax(180px, 1.2fr) repeat(4, minmax(120px, .75fr));
      gap: 10px;
      padding: 14px 0;
      background: rgba(244, 246, 242, .94);
      backdrop-filter: blur(10px);
    }

    input,
    select,
    button {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      font: inherit;
      outline: none;
    }

    input,
    select {
      padding: 0 12px;
    }

    input:focus,
    select:focus,
    button:focus-visible {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(31, 111, 85, .14);
    }

    .modes {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 6px 0 16px;
    }

    button {
      cursor: pointer;
      font-weight: 750;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(31, 111, 85, .45);
    }

    button.active {
      background: var(--deep);
      color: #fff;
      border-color: var(--deep);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .48;
      transform: none;
    }

    .mini {
      min-height: 30px;
      padding: 0 10px;
      font-size: 12px;
    }

    .spotlight {
      display: none;
      margin: 2px 0 18px;
    }

    .spotlight.show {
      display: block;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .pitch {
      display: grid;
      gap: 12px;
      min-height: 460px;
      padding: 18px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, .45);
      background:
        linear-gradient(90deg, rgba(255, 255, 255, .10) 50%, transparent 50%) 0 0 / 26px 26px,
        linear-gradient(180deg, #287a57, #16513f);
      box-shadow: var(--shadow);
    }

    .pitch-row {
      display: grid;
      gap: 10px;
      align-items: center;
    }

    .pitch-row.forwards {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .pitch-row.mids {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .pitch-row.defs {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .pitch-row.gk {
      grid-template-columns: minmax(0, .8fr);
      justify-content: center;
    }

    .slot {
      position: relative;
      min-height: 86px;
      display: grid;
      align-content: center;
      gap: 4px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, .88);
      border: 1px solid rgba(255, 255, 255, .55);
      text-align: center;
    }

    .slot-role {
      color: #1f6f55;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0;
    }

    .slot b {
      font-size: 16px;
      line-height: 1.2;
    }

    .slot small {
      color: #52635c;
    }

    .slot.empty {
      color: rgba(255, 255, 255, .74);
      background: rgba(255, 255, 255, .16);
      border: 1px dashed rgba(255, 255, 255, .55);
    }

    .slot.empty small {
      color: rgba(255, 255, 255, .74);
    }

    .slot.empty .slot-role {
      color: rgba(255, 255, 255, .86);
    }

    .slot-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px;
      margin-top: 4px;
    }

    .choice-bar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .formation-control {
      display: flex;
      align-items: center;
      gap: 7px;
      justify-content: flex-end;
    }

    .formation-control select {
      min-height: 32px;
      width: auto;
      min-width: 126px;
      padding: 0 10px;
      font-size: 12px;
    }

    .choice-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 7px;
    }

    .rank-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
    }

    .rank-item {
      display: grid;
      grid-template-columns: 40px 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 72px;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 10px 22px rgba(31, 44, 38, .07);
    }

    .rank-no {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #f3d39f;
      color: #5c3511;
      font-weight: 850;
    }

    .rank-item.empty {
      color: var(--muted);
      background: rgba(255, 255, 255, .62);
      border-style: dashed;
      box-shadow: none;
    }

    .rank-actions {
      display: grid;
      grid-template-columns: repeat(3, 30px);
      gap: 4px;
    }

    .rank-actions .mini,
    .slot .mini,
    .slot-actions .mini {
      width: auto;
    }

    .section-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 12px 0 10px;
    }

    .section-line h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(218px, 1fr));
      gap: 10px;
    }

    .player {
      display: grid;
      gap: 8px;
      min-height: 154px;
      padding: 13px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 10px 22px rgba(31, 44, 38, .06);
    }

    .player.selected {
      border-color: rgba(31, 111, 85, .72);
      box-shadow: 0 12px 26px rgba(31, 111, 85, .12);
    }

    .player-head {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      align-items: start;
    }

    .flag {
      font-size: 25px;
      line-height: 1;
    }

    .player b {
      display: block;
      font-size: 16px;
      line-height: 1.23;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-self: end;
    }

    .chip {
      padding: 4px 7px;
      border-radius: 999px;
      color: #fff;
      font-size: 12px;
      font-weight: 750;
      line-height: 1;
    }

    .pos-GK { background: var(--blue); }
    .pos-DEF { background: var(--green); }
    .pos-MID { background: var(--gold); color: #2c1b06; }
    .pos-FWD { background: var(--red); }
    .tag { background: #273733; }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      align-self: end;
    }

    .actions button.is-picked {
      background: var(--deep);
      color: #fff;
      border-color: var(--deep);
    }

    .empty {
      display: none;
      padding: 24px;
      border: 1px dashed #b8c2bc;
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, .5);
    }

    .empty.show {
      display: block;
    }

    footer {
      margin-top: 22px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    @media (max-width: 820px) {
      header {
        grid-template-columns: 1fr;
      }

      .stats {
        min-width: 0;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .toolbar {
        position: static;
        grid-template-columns: 1fr 1fr;
      }

      .toolbar input {
        grid-column: 1 / -1;
      }

      .modes {
        grid-template-columns: 1fr;
      }

      .pitch {
        min-height: auto;
        min-width: 720px;
        padding: 12px;
      }

      .pitch-row.forwards,
      .pitch-row.mids {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .pitch-row.defs {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .pitch-row.gk {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .shell {
        width: min(100% - 18px, 1180px);
      }

      h1 {
        font-size: 25px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .grid,
      .rank-list {
        grid-template-columns: 1fr;
      }

      .choice-bar,
      .rank-item {
        grid-template-columns: 1fr;
      }

      .choice-actions {
        justify-content: stretch;
      }

      .choice-actions .mini {
        flex: 1 1 auto;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .rank-actions {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .pitch-row.forwards,
      .pitch-row.mids {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .pitch-row.defs {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
  </style>
</head>

          {line: "GK", slots: [["GK", "门将", "GK"]]}
        ]
      },
      "352": {
        label: "3-5-2",
        rows: [
          {line: "FWD", slots: [["LS", "左前锋", "FWD"], ["RS", "右前锋", "FWD"]]},
          {line: "MID", slots: [["LM", "左翼卫", "MID"], ["LCM", "左中场", "MID"], ["CM", "中场", "MID"], ["RCM", "右中场", "MID"], ["RM", "右翼卫", "MID"]]},
          {line: "DEF", slots: [["LCB", "左中卫", "DEF"], ["CB", "中卫", "DEF"], ["RCB", "右中卫", "DEF"]]},
          {line: "GK", slots: [["GK", "门将", "GK"]]}
        ]
      },
      "343": {
        label: "3-4-3",
        rows: [
          {line: "FWD", slots: [["LW", "左边锋", "FWD"], ["ST", "中锋", "FWD"], ["RW", "右边锋", "FWD"]]},
          {line: "MID", slots: [["LM", "左翼卫", "MID"], ["LCM", "左中场", "MID"], ["RCM", "右中场", "MID"], ["RM", "右翼卫", "MID"]]},
          {line: "DEF", slots: [["LCB", "左中卫", "DEF"], ["CB", "中卫", "DEF"], ["RCB", "右中卫", "DEF"]]},
          {line: "GK", slots: [["GK", "门将", "GK"]]}
        ]
      },
      "532": {
        label: "5-3-2",
        rows: [
          {line: "FWD", slots: [["LS", "左前锋", "FWD"], ["RS", "右前锋", "FWD"]]},
          {line: "MID", slots: [["LCM", "左中场", "MID"], ["CM", "中场", "MID"], ["RCM", "右中场", "MID"]]},
          {line: "DEF", slots: [["LWB", "左翼卫", "DEF"], ["LCB", "左中卫", "DEF"], ["CB", "中卫", "DEF"], ["RCB", "右中卫", "DEF"], ["RWB", "右翼卫", "DEF"]]},
          {line: "GK", slots: [["GK", "门将", "GK"]]}
        ]
      }
    };
    const defaultFormation = "433";
    const storageKey = "world-football-user-picks-v2";

    let mode = "all";

    function normalized(text) {
      return String(text).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function makeId(player, index) {
      return normalized(`${player.name}-${player.country}-${index}`).replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    }

    players.forEach((player, index) => {
      Object.assign(player, {cn: player.cn || player.name, nick: player.nick || ""}, localNames[player.name] || {});
      player.id = makeId(player, index);
    });

    const playerById = new Map(players.map(player => [player.id, player]));
    let picks = loadPicks();

    function currentFormationKey() {
      return formations[picks?.formation] ? picks.formation : defaultFormation;
    }

    function currentFormation() {
      return formations[currentFormationKey()];
    }

    function formationRows(key = currentFormationKey()) {
      return formations[key].rows.map(row => ({
        line: row.line,
        slots: row.slots.map(([role, name, line]) => ({role, name, line}))
      }));
    }

    function formationSlots(key = currentFormationKey()) {
      return formationRows(key).flatMap(row => row.slots);
    }

    function emptyXiSlots(key = currentFormationKey()) {
      return Array.from({length: formationSlots(key).length}, () => "");
    }

    function xiSlotIds() {
      return Array.isArray(picks.xiSlots) ? picks.xiSlots : emptyXiSlots();
    }

    function xiIds() {
      return xiSlotIds().filter(Boolean);
    }

    function xiCount() {
      return xiIds().length;
    }

    function canFitSlot(player, slot) {
      if (!player || !slot) return false;
      if (slot.line === "GK") return player.pos === "GK";
      return player.pos !== "GK";
    }

    function firstOpenSlotFor(player, slotIds = xiSlotIds(), key = currentFormationKey()) {
      const slots = formationSlots(key);
      if (player.pos !== "GK") {
        const exact = slots.findIndex((slot, index) => !slotIds[index] && slot.line === player.pos && canFitSlot(player, slot));
        if (exact !== -1) return exact;
      }
      return slots.findIndex((slot, index) => !slotIds[index] && canFitSlot(player, slot));
    }

    function placePlayerInSlots(id, slotIds, key) {
      const player = playerById.get(id);
      if (!player || slotIds.includes(id)) return false;
      const index = firstOpenSlotFor(player, slotIds, key);
      if (index === -1) return false;
      slotIds[index] = id;
      return true;
    }

    function syncXiLegacy() {
      picks.xi = xiIds();
    }

    function fillSelect(select, first, values) {
      select.innerHTML = "";
      const firstOption = new Option(first.label, first.value);
      select.append(firstOption);
      values.forEach(value => select.append(new Option(value, value)));
    }

    function setupControls() {
      const eras = [...new Set(players.map(player => player.era))].sort();
      const countries = [...new Set(players.map(player => player.country))].sort();
      fillSelect(controls.era, {label:"全部年代", value:""}, eras);
      fillSelect(controls.position, {label:"全部位置", value:""}, ["GK", "DEF", "MID", "FWD"].map(pos => `${pos} · ${labels[pos]}`));
      fillSelect(controls.country, {label:"全部国家", value:""}, countries);
      fillSelect(controls.sort, {label:"按姓名", value:"name"}, ["按国家", "按位置", "按年代", "按最佳排序"]);
    }

    function loadPicks() {
      try {
        return sanitizePicks(JSON.parse(localStorage.getItem(storageKey)) || {});
      } catch {
        return sanitizePicks({});
      }
    }

    function savePicks() {
      try {
        localStorage.setItem(storageKey, JSON.stringify(picks));
      } catch {
      }
    }

    function uniqueValidIds(ids, max) {
      const seen = new Set();
      return Array.isArray(ids)
        ? ids.filter(id => playerById.has(id) && !seen.has(id) && seen.add(id)).slice(0, max)
        : [];
    }

    function sanitizePicks(raw) {
      const formation = formations[raw.formation] ? raw.formation : defaultFormation;
      const slots = formationSlots(formation);
      const xiSlots = Array.from({length: slots.length}, () => "");
      const source = Array.isArray(raw.xiSlots) ? raw.xiSlots : raw.xi;
      const seen = new Set();

      if (Array.isArray(source)) {
        source.slice(0, 22).forEach((id, sourceIndex) => {
          if (!id || seen.has(id) || !playerById.has(id)) return;
          const player = playerById.get(id);
          const directIndex = sourceIndex < xiSlots.length && !xiSlots[sourceIndex] && canFitSlot(player, slots[sourceIndex])
            ? sourceIndex
            : -1;
          if (directIndex !== -1) {
            xiSlots[directIndex] = id;
            seen.add(id);
            return;
          }
          if (placePlayerInSlots(id, xiSlots, formation)) seen.add(id);
        });
      }

      return {formation, xiSlots, xi: xiSlots.filter(Boolean), top10: uniqueValidIds(raw.top10, 10)};
    }

    function filteredPlayers() {
      const query = normalized(controls.search.value.trim());
      const era = controls.era.value;
      const country = controls.country.value;
      const position = controls.position.value.slice(0, 3).trim();
      const sort = controls.sort.value;

      let list = players.filter(player => {
        const text = normalized(`${player.name} ${player.cn} ${player.nick} ${player.country} ${player.note} ${player.era}`);
        const matchQuery = !query || text.includes(query);
        const matchEra = !era || player.era === era;
        const matchCountry = !country || player.country === country;
        const matchPosition = !position || player.pos === position;
        return matchQuery && matchEra && matchCountry && matchPosition;
      });

      list = [...list].sort((a, b) => {
        const selectedDiff = selectedWeight(b) - selectedWeight(a);
        if (selectedDiff) return selectedDiff;
        if (sort === "按国家") return a.country.localeCompare(b.country) || a.name.localeCompare(b.name);
        if (sort === "按位置") return posWeight(a.pos) - posWeight(b.pos) || a.name.localeCompare(b.name);
        if (sort === "按年代") return a.era.localeCompare(b.era) || a.name.localeCompare(b.name);
        if (sort === "按最佳排序") return (a.top10 || 80) - (b.top10 || 80) || xiWeight(a) - xiWeight(b) || a.name.localeCompare(b.name);
        return a.name.localeCompare(b.name);
      });

      return list;
    }

    function selectedWeight(player) {
      if (mode === "xi") return isInXi(player) ? 1 : 0;
      if (mode === "top10") return topRank(player) ? 1 : 0;
      return isInXi(player) || topRank(player) ? 1 : 0;
    }

    function posWeight(pos) {
      return {GK: 1, DEF: 2, MID: 3, FWD: 4}[pos] || 9;
    }

    function xiWeight(player) {
      const formation = {FWD: 1, MID: 2, DEF: 3, GK: 4};
      return (formation[player.xi] || formation[player.pos] || 9) * 100 + players.indexOf(player);
    }

    function topRank(player) {
      const index = picks.top10.indexOf(player.id);
      return index === -1 ? 0 : index + 1;
    }

    function isInXi(player) {
      return xiIds().includes(player.id);
    }

    function xiBlockReason(player) {
      if (isInXi(player)) return "";
      if (xiCount() >= 11) return "阵容已满";
      if (firstOpenSlotFor(player) === -1) return player.pos === "GK" ? "门将已满" : "空位已满";
      return "";
    }

    function playerCard(player) {
      const inXi = isInXi(player);
      const rank = topRank(player);
      const xiReason = xiBlockReason(player);
      const topFull = !rank && picks.top10.length >= 10;
      const tags = [
        `<span class="chip pos-${player.pos}">${labels[player.pos]}</span>`,
        player.nick ? `<span class="chip tag">${player.nick}</span>` : "",
        inXi ? `<span class="chip tag">我的阵容</span>` : "",
        rank ? `<span class="chip tag">我的第${rank}</span>` : ""
      ].join("");

      return `
        <article class="player ${inXi || rank ? "selected" : ""}">
          <div class="player-head">
            <span class="flag" aria-hidden="true">${player.flag}</span>
            <div>
              <b>${player.cn}</b>
              <div class="meta">${player.name}<br>${player.country} · ${player.era}</div>
            </div>
          </div>
          <div class="meta">${player.years}<br>${player.note}</div>
          <div class="chips">${tags}</div>
          <div class="actions">
            <button type="button" data-action="toggle-xi" data-id="${player.id}" class="${inXi ? "is-picked" : ""}" ${xiReason ? "disabled" : ""}>${inXi ? "移出阵容" : xiReason || "选入阵容"}</button>
            <button type="button" data-action="toggle-top" data-id="${player.id}" class="${rank ? "is-picked" : ""}" ${topFull ? "disabled" : ""}>${rank ? "移出前十" : topFull ? "前十已满" : "选入前十"}</button>
          </div>
        </article>
      `;
    }

    function canMoveXi(index, dir) {
      const target = index + Number(dir);
      const slots = formationSlots();
      const slotIds = xiSlotIds();
      if (!slotIds[index] || target < 0 || target >= slots.length) return false;
      const player = playerById.get(slotIds[index]);
      const targetPlayer = playerById.get(slotIds[target]);
      return canFitSlot(player, slots[target]) && (!targetPlayer || canFitSlot(targetPlayer, slots[index]));
    }

    function renderPitch() {
      const formation = currentFormation();
      const rows = formationRows();
      const slotIds = xiSlotIds();
      const formationOptions = Object.entries(formations)
        .map(([key, item]) => `<option value="${key}" ${key === currentFormationKey() ? "selected" : ""}>${item.label}</option>`)
        .join("");
      let index = 0;

      const slotMarkup = slot => {
        const slotIndex = index;
        index += 1;
        const player = playerById.get(slotIds[slotIndex]);
        if (!player) {
          return `
            <div class="slot empty">
              <span class="slot-role">${slot.role} · ${slot.name}</span>
              <b>空位</b>
              <small>${labels[slot.line]}</small>
            </div>
          `;
        }
        return `
          <div class="slot">
            <span class="slot-role">${slot.role} · ${slot.name}</span>
            <b>${player.flag} ${player.cn}</b>
            <small>${player.name}${player.nick ? ` · ${player.nick}` : ""}<br>${labels[player.pos]} · ${player.country}</small>
            <div class="slot-actions">
              <button type="button" class="mini" data-action="move-xi" data-index="${slotIndex}" data-dir="-1" ${canMoveXi(slotIndex, -1) ? "" : "disabled"} title="向前换位">←</button>
              <button type="button" class="mini" data-action="move-xi" data-index="${slotIndex}" data-dir="1" ${canMoveXi(slotIndex, 1) ? "" : "disabled"} title="向后换位">→</button>
              <button type="button" class="mini" data-action="remove-xi" data-id="${player.id}" title="移除">×</button>
            </div>
          </div>
        `;
      };

      const rowMarkup = row => {
        const count = row.slots.length;
        const style = count === 1
          ? "grid-template-columns:minmax(0,.72fr);justify-content:center;"
          : `grid-template-columns:repeat(${count},minmax(0,1fr));`;
        return `<div class="pitch-row line-${row.line.toLowerCase()}" style="${style}">${row.slots.map(slotMarkup).join("")}</div>`;
      };

      return `
        <div class="choice-bar">
          <span>${formation.label} · ${xiCount()}/11</span>
          <label class="formation-control">
            <span>阵型</span>
            <select data-action="set-formation" aria-label="选择阵型">${formationOptions}</select>
          </label>
          <div class="choice-actions">
            <button type="button" class="mini" data-action="export-xi" ${xiCount() ? "" : "disabled"}>导出图片</button>
            <button type="button" class="mini" data-action="clear-xi" ${xiCount() ? "" : "disabled"}>清空阵容</button>
          </div>
        </div>
        <div class="pitch" aria-label="我的历史最佳阵容">
          ${rows.map(rowMarkup).join("")}
        </div>
      `;
    }

    function renderTop10() {
      const selected = picks.top10.map(id => playerById.get(id)).filter(Boolean);
      const rows = Array.from({length: 10}, (_, index) => {
        const player = selected[index];
        if (!player) {
          return `
            <article class="rank-item empty">
              <span class="rank-no">${index + 1}</span>
              <div>空位</div>
            </article>
          `;
        }
        return `
          <article class="rank-item">
            <span class="rank-no">${index + 1}</span>
            <div>
              <b>${player.flag} ${player.cn}</b>
              <div class="meta">${player.name}${player.nick ? ` · ${player.nick}` : ""}<br>${player.country} · ${labels[player.pos]} · ${player.era}</div>
            </div>
            <div class="rank-actions">
              <button type="button" class="mini" data-action="move-top" data-id="${player.id}" data-dir="-1" ${index === 0 ? "disabled" : ""}>↑</button>
              <button type="button" class="mini" data-action="move-top" data-id="${player.id}" data-dir="1" ${index === selected.length - 1 ? "disabled" : ""}>↓</button>
              <button type="button" class="mini" data-action="remove-top" data-id="${player.id}">×</button>
            </div>
          </article>
        `;
      }).join("");

      return `
        <div class="choice-bar">
          <span>${picks.top10.length}/10</span>
          <div class="choice-actions">
            <button type="button" class="mini" data-action="export-top" ${picks.top10.length ? "" : "disabled"}>导出图片</button>
            <button type="button" class="mini" data-action="clear-top" ${picks.top10.length ? "" : "disabled"}>清空前十</button>
          </div>
        </div>
        <div class="rank-list" aria-label="我的历史最佳10人">${rows}</div>
      `;
    }

    function canvasKit(width, height) {
      const ratio = 2;
      const canvas = document.createElement("canvas");
      canvas.width = width * ratio;
      canvas.height = height * ratio;
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      const ctx = canvas.getContext("2d");
      ctx.scale(ratio, ratio);
      ctx.textBaseline = "top";
      return {canvas, ctx};
    }

    function roundRect(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }

    function drawText(ctx, text, x, y, size, color = "#1e2522", weight = "700", align = "left") {
      ctx.fillStyle = color;
      ctx.font = `${weight} ${size}px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
      ctx.textAlign = align;
      ctx.fillText(text, x, y);
    }

    function drawPlayerTile(ctx, player, x, y, width, height, rank = "", role = "") {
      roundRect(ctx, x, y, width, height, 14);
      ctx.fillStyle = "rgba(255,255,255,.92)";
      ctx.fill();
      ctx.strokeStyle = "rgba(23,56,50,.18)";
      ctx.stroke();
      if (rank) {
        ctx.fillStyle = "#f3d39f";
        ctx.beginPath();
        ctx.arc(x + 34, y + 34, 20, 0, Math.PI * 2);
        ctx.fill();
        drawText(ctx, rank, x + 34, y + 23, 16, "#5c3511", "850", "center");
      }
      const nameX = x + (rank ? 66 : 18);
      drawText(ctx, `${player.flag} ${player.cn}`, nameX, y + 16, 22, "#1e2522", "850");
      if (role) drawText(ctx, role, x + width - 16, y + 18, 13, "#1f6f55", "850", "right");
      drawText(ctx, player.name, nameX, y + 45, 15, "#66706b", "650");
      if (player.nick) drawText(ctx, player.nick, nameX, y + 68, 14, "#1f6f55", "750");
    }

    function downloadCanvas(canvas, filename) {
      const link = document.createElement("a");
      link.download = filename;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    function exportXiImage() {
      const selected = xiIds().map(id => playerById.get(id)).filter(Boolean);
      if (!selected.length) return;
      const rows = formationRows();
      const slotIds = xiSlotIds();
      const formation = currentFormation();
      const {canvas, ctx} = canvasKit(1200, 1000);
      ctx.fillStyle = "#f4f6f2";
      ctx.fillRect(0, 0, 1200, 1000);
      drawText(ctx, "我的世界足坛历史最佳阵容", 600, 44, 40, "#173832", "900", "center");
      drawText(ctx, `${formation.label} · 制作者：锅巴32595 · ${selected.length}/11`, 600, 96, 18, "#66706b", "650", "center");

      const pitchX = 70;
      const pitchY = 145;
      const pitchW = 1060;
      const pitchH = 760;
      roundRect(ctx, pitchX, pitchY, pitchW, pitchH, 20);
      ctx.fillStyle = "#1f6f55";
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,.7)";
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.strokeStyle = "rgba(255,255,255,.28)";
      ctx.lineWidth = 1;
      for (let i = 1; i < 12; i += 1) {
        ctx.beginPath();
        ctx.moveTo(pitchX + i * 88, pitchY);
        ctx.lineTo(pitchX + i * 88, pitchY + pitchH);
        ctx.stroke();
      }

      let index = 0;
      const rowH = pitchH / rows.length;
      rows.forEach((row, rowIndex) => {
        const count = row.slots.length;
        const gap = 26;
        const tileW = Math.min(count === 1 ? 300 : 230, (pitchW - (count - 1) * gap - 80) / count);
        const tileH = rows.length > 4 ? 92 : 102;
        const total = count * tileW + (count - 1) * gap;
        const startX = 600 - total / 2;
        const y = pitchY + rowIndex * rowH + rowH / 2 - tileH / 2;
        row.slots.forEach((slot, slotIndex) => {
          const player = playerById.get(slotIds[index]);
          const x = startX + slotIndex * (tileW + gap);
          if (player) {
            drawPlayerTile(ctx, player, x, y, tileW, tileH, "", slot.role);
          } else {
            roundRect(ctx, x, y, tileW, tileH, 14);
            ctx.fillStyle = "rgba(255,255,255,.18)";
            ctx.fill();
            drawText(ctx, `${slot.role}空位`, x + tileW / 2, y + 26, 18, "rgba(255,255,255,.82)", "800", "center");
            drawText(ctx, slot.name, x + tileW / 2, y + 53, 15, "rgba(255,255,255,.68)", "700", "center");
          }
          index += 1;
        });
      });

      drawText(ctx, "世界足坛数据库 1950-2026", 600, 940, 18, "#66706b", "700", "center");
      downloadCanvas(canvas, "my-football-best-xi.png");
    }

    function exportTopImage() {
      const selected = picks.top10.map(id => playerById.get(id)).filter(Boolean);
      if (!selected.length) return;
      const {canvas, ctx} = canvasKit(1000, 1460);
      ctx.fillStyle = "#f4f6f2";
      ctx.fillRect(0, 0, 1000, 1460);
      drawText(ctx, "我的世界足坛历史最佳10人", 500, 44, 38, "#173832", "900", "center");
      drawText(ctx, `制作者：锅巴32595 · ${selected.length}/10`, 500, 94, 18, "#66706b", "650", "center");

      Array.from({length: 10}, (_, index) => selected[index] || null).forEach((player, index) => {
        const y = 150 + index * 120;
        if (player) {
          drawPlayerTile(ctx, player, 90, y, 820, 96, String(index + 1));
        } else {
          roundRect(ctx, 90, y, 820, 96, 14);
          ctx.fillStyle = "rgba(255,255,255,.62)";
          ctx.fill();
          ctx.strokeStyle = "rgba(23,56,50,.14)";
          ctx.stroke();
          drawText(ctx, `${index + 1}. 空位`, 500, y + 35, 22, "#66706b", "800", "center");
        }
      });

      drawText(ctx, "世界足坛数据库 1950-2026", 500, 1378, 18, "#66706b", "700", "center");
      downloadCanvas(canvas, "my-football-top-10.png");
    }

    function renderSpotlight() {
      const spotlight = document.querySelector("#spotlight");
      if (mode === "xi") {
        spotlight.classList.add("show");
        spotlight.innerHTML = renderPitch();
        return;
      }
      if (mode === "top10") {
        spotlight.classList.add("show");
        spotlight.innerHTML = renderTop10();
        return;
      }
      spotlight.classList.remove("show");
      spotlight.innerHTML = "";
    }

    function render() {
      const list = filteredPlayers();
      document.querySelector("#players").innerHTML = list.map(playerCard).join("");
      document.querySelector("#empty").classList.toggle("show", list.length === 0);
      document.querySelector("#totalCount").textContent = players.length;
      document.querySelector("#shownCount").textContent = list.length;
      document.querySelector("#xiCount").textContent = `${xiCount()}/11`;
      document.querySelector("#topCount").textContent = `${picks.top10.length}/10`;
      document.querySelector("#listTitle").textContent = mode === "xi" ? "从球员库选择阵容" : mode === "top10" ? "从球员库选择前十" : "球员列表";
      document.querySelector("#listHint").textContent = `${list.length} / ${players.length} · 阵容 ${xiCount()}/11 · 前十 ${picks.top10.length}/10`;
      renderSpotlight();
    }

    function toggleXi(id) {
      const player = playerById.get(id);
      if (!player) return;
      if (isInXi(player)) {
        removeXi(id);
      } else if (!xiBlockReason(player)) {
        placePlayerInSlots(id, picks.xiSlots, currentFormationKey());
        syncXiLegacy();
      }
    }

    function removeXi(id) {
      picks.xiSlots = xiSlotIds().map(item => item === id ? "" : item);
      syncXiLegacy();
    }

    function moveXi(index, dir) {
      const target = Number(index) + Number(dir);
      if (!canMoveXi(Number(index), Number(dir))) return;
      const next = [...xiSlotIds()];
      [next[index], next[target]] = [next[target], next[index]];
      picks.xiSlots = next;
      syncXiLegacy();
    }

    function setFormation(key) {
      if (!formations[key] || key === currentFormationKey()) return;
      const ids = xiIds();
      picks.formation = key;
      picks.xiSlots = emptyXiSlots(key);
      ids.forEach(id => placePlayerInSlots(id, picks.xiSlots, key));
      syncXiLegacy();
    }

    function toggleTop(id) {
      if (!playerById.has(id)) return;
      if (picks.top10.includes(id)) {
        picks.top10 = picks.top10.filter(item => item !== id);
      } else if (picks.top10.length < 10) {
        picks.top10 = [...picks.top10, id];
      }
    }

    function moveTop(id, dir) {
      const index = picks.top10.indexOf(id);
      const target = index + Number(dir);
      if (index === -1 || target < 0 || target >= picks.top10.length) return;
      const next = [...picks.top10];
      [next[index], next[target]] = [next[target], next[index]];
      picks.top10 = next;
    }

    function handleAction(button) {
      const action = button.dataset.action;
      const id = button.dataset.id;
      if (action === "export-xi") {
        exportXiImage();
        return;
      }
      if (action === "export-top") {
        exportTopImage();
        return;
      }
      if (action === "toggle-xi") toggleXi(id);
      if (action === "toggle-top") toggleTop(id);
      if (action === "remove-xi") removeXi(id);
      if (action === "remove-top") picks.top10 = picks.top10.filter(item => item !== id);
      if (action === "move-xi") moveXi(Number(button.dataset.index), button.dataset.dir);
      if (action === "move-top") moveTop(id, button.dataset.dir);
      if (action === "clear-xi") {
        picks.xiSlots = emptyXiSlots();
        syncXiLegacy();
      }
      if (action === "clear-top") picks.top10 = [];
      picks = sanitizePicks(picks);
      savePicks();
      render();
    }

    document.querySelectorAll("[data-mode]").forEach(button => {
      button.addEventListener("click", () => {
        mode = button.dataset.mode;
        document.querySelectorAll("[data-mode]").forEach(item => item.classList.toggle("active", item === button));
        render();
      });
    });

    document.querySelector("#players").addEventListener("click", event => {
      const button = event.target.closest("button[data-action]");
      if (button && !button.disabled) handleAction(button);
    });

    document.querySelector("#spotlight").addEventListener("click", event => {
      const button = event.target.closest("button[data-action]");
      if (button && !button.disabled) handleAction(button);
    });

    document.querySelector("#spotlight").addEventListener("change", event => {
      const select = event.target.closest("select[data-action='set-formation']");
      if (!select) return;
      setFormation(select.value);
      picks = sanitizePicks(picks);
      savePicks();
      render();
    });

    Object.values(controls).forEach(control => control.addEventListener("input", render));

    setupControls();
    render();
  </script>
</body>
</html>
